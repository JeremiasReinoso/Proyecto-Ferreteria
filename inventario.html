<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario | Ferreteria El Vecino</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-toolbox"></i>
                <span>Ferreteria El Vecino</span>
            </div>
            <nav class="nav">
                <a href="index.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a class="active" href="inventario.html"><i class="fa-solid fa-boxes-stacked"></i> Inventario</a>
                <a href="ventas.html"><i class="fa-solid fa-cash-register"></i> Ventas</a>
                <a href="historial.html"><i class="fa-solid fa-clock-rotate-left"></i> Historial de venta</a>
            </nav>
        </aside>

        <main class="main">
            <header class="topbar">
                <h1>Inventario</h1>
                <p id="fechaActual"></p>
            </header>

            <section class="card">
                <div class="toolbar">
                    <div class="search-box">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input id="searchInput" type="search" placeholder="Buscar producto por nombre...">
                    </div>
                    <button id="btnNuevo" class="btn">
                        <i class="fa-solid fa-plus"></i>
                        Agregar producto
                    </button>
                </div>

                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Nombre</th>
                                <th>Categoria</th>
                                <th>Codigo</th>
                                <th>Precio</th>
                                <th>Stock</th>
                                <th>Estado</th>
                                <th>Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="inventarioBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="productModal" class="modal-overlay" aria-hidden="true">
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
            <div class="modal-header">
                <h2 id="modalTitle">Agregar producto</h2>
                <button id="closeModalBtn" class="icon-btn" type="button" aria-label="Cerrar modal">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <form id="productForm" class="modal-form">
                <input id="modalProductId" type="hidden">

                <label>
                    Nombre del producto
                    <input id="modalNombre" type="text" required>
                </label>

                <label>
                    Categoria
                    <input id="modalCategoria" type="text" required>
                </label>

                <label>
                    Precio
                    <input id="modalPrecio" type="number" min="1" required>
                </label>

                <label>
                    Cantidad en stock
                    <input id="modalStock" type="number" min="0" required>
                </label>

                <label>
                    Codigo del producto (opcional)
                    <input id="modalCodigo" type="text" maxlength="30">
                </label>

                <div class="modal-actions">
                    <button id="cancelModalBtn" type="button" class="btn ghost">Cancelar</button>
                    <button type="submit" class="btn">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <div id="toastContainer" class="toast-container" aria-live="polite" aria-atomic="true"></div>

    <script src="js/app.js"></script>
    <script src="js/inventario.js"></script>
</body>
</html>
