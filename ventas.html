<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ventas | Ferreteria El Vecino</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-toolbox"></i>
                <span>Ferreteria El VecinoS</span>
            </div>
            <nav class="nav">
                <a href="index.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="inventario.html"><i class="fa-solid fa-boxes-stacked"></i> Inventario</a>
                <a class="active" href="ventas.html"><i class="fa-solid fa-cash-register"></i> Ventas</a>
            </nav>
        </aside>

        <main class="main">
            <header class="topbar">
                <h1>Registro de Ventas</h1>
                <p id="fechaActual"></p>
            </header>

            <section class="card">
                <form id="ventaForm" class="venta-form">
                    <label>
                        Producto
                        <select id="ventaProducto" required></select>
                    </label>
                    <label>
                        Cantidad
                        <input id="ventaCantidad" type="number" min="1" value="1" required>
                    </label>
                    <button type="submit" class="btn">
                        <i class="fa-solid fa-check"></i>
                        Registrar venta
                    </button>
                </form>
                <p id="ventaFeedback" class="feedback"></p>
            </section>

            <section class="cards-grid compact">
                <article class="card kpi">
                    <p>Ventas de hoy</p>
                    <h2 id="ventasDiaCard">0</h2>
                </article>
                <article class="card kpi">
                    <p>Ingresos de hoy</p>
                    <h2 id="ingresosDiaCard">$0</h2>
                </article>
            </section>

            <section class="card">
                <div class="section-title">
                    <h3>Historial de ventas</h3>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Producto</th>
                                <th>Cantidad</th>
                                <th>Total</th>
                            </tr>
                        </thead>
                        <tbody id="ventasBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script src="js/ventas.js"></script>
</body>
</html>
