<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Ferreteria El Vecino</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-toolbox"></i>
                <span>Ferreteria El Vecino</span>
            </div>
            <nav class="nav">
                <a class="active" href="index.html"><i class="fa-solid fa-chart-line"></i> Dashboard</a>
                <a href="inventario.html"><i class="fa-solid fa-boxes-stacked"></i> Inventario</a>
                <a href="ventas.html"><i class="fa-solid fa-cash-register"></i> Ventas</a>
            </nav>
        </aside>

        <main class="main">
            <header class="topbar">
                <h1>Dashboard</h1>
                <p id="fechaActual"></p>
            </header>

            <section class="cards-grid">
                <article class="card kpi">
                    <p>Total de productos</p>
                    <h2 id="kpiTotalProductos">0</h2>
                    <i class="fa-solid fa-cubes icon primary"></i>
                </article>
                <article class="card kpi">
                    <p>Stock bajo</p>
                    <h2 id="kpiStockBajo">0</h2>
                    <i class="fa-solid fa-triangle-exclamation icon danger"></i>
                </article>
                <article class="card kpi">
                    <p>Ventas del dia</p>
                    <h2 id="kpiVentasDia">0</h2>
                    <i class="fa-solid fa-receipt icon info"></i>
                </article>
                <article class="card kpi">
                    <p>Ingresos del dia</p>
                    <h2 id="kpiIngresosDia">$0</h2>
                    <i class="fa-solid fa-sack-dollar icon success"></i>
                </article>
            </section>

            <section class="card">
                <div class="section-title">
                    <h3>Productos en alerta</h3>
                    <span>Stock <= 10</span>
                </div>
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Stock</th>
                                <th>Estado</th>
                            </tr>
                        </thead>
                        <tbody id="alertasBody"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
